name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r gateway/requirements-dev.txt

      - name: Run tests with coverage gate
        shell: bash
        run: |
          cd gateway
          python -m pytest tests/ -v \
            --cov=gateway \
            --cov-branch \
            --cov-report=term-missing \
            --cov-fail-under=100

      - name: Cross-platform smoke checks (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ./tools/ci-smoke.sh

      - name: Cross-platform smoke checks (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./tools/ci-smoke.ps1

      - name: PowerShell MCP smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./tests/smoke/mcp-smoke.ps1

  fresh-install-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Fresh install smoke (Linux runtime)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
            MCP_SETUP_CI=1 ./setup.sh
            PORT="${PG_MCP_PORT:-8090}"

            health_code=$(curl -sS -o /dev/null -w "%{http_code}" "http://localhost:${PORT}/health")
            [ "$health_code" = "200" ] || { echo "health endpoint failed: ${health_code}"; exit 1; }

            dashboard_code=$(curl -sS -o /dev/null -w "%{http_code}" "http://localhost:${PORT}/dashboard")
            [ "$dashboard_code" = "200" ] || { echo "dashboard endpoint failed: ${dashboard_code}"; exit 1; }

            mcp_code=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "http://localhost:${PORT}/mcp")
            if [ "$mcp_code" = "000" ] || [ "$mcp_code" = "404" ]; then
              echo "mcp endpoint is not reachable: ${mcp_code}"
              exit 1
            fi

            docker compose down -v || true
          else
            echo "Docker unavailable on this runner; running static setup checks only"
            bash -n setup.sh
          fi

      - name: Fresh install smoke (Windows static checks)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./tools/ci-smoke.ps1
          if (-not (Test-Path "install.cmd")) { throw "install.cmd is missing" }
          if (-not (Test-Path "install.ps1")) { throw "install.ps1 is missing" }
          if (-not (Test-Path "uninstall.cmd")) { throw "uninstall.cmd is missing" }
          if (-not (Test-Path "uninstall.ps1")) { throw "uninstall.ps1 is missing" }
